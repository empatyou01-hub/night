<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under The Stars</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at bottom, #1B2735 0%, #090A0F 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Bintang-bintang */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        .tent {
            font-size: 80px;
            cursor: pointer;
            transition: transform 0.3s;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }
        .tent:hover { transform: scale(1.1); }

        #message {
            display: none;
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 300px;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { font-size: 1.2rem; margin-bottom: 10px; color: #FFD700; }
        p { font-size: 0.95rem; line-height: 1.6; }
        .hint { font-size: 0.8rem; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="stars" id="starField"></div>

    <div class="container">
        <div class="tent" id="tentBtn" onclick="openMessage()">⛺</div>
        <p id="instruction" class="hint">Coba ketuk tendanya...</p>

        <div id="message">
            <h2>Pesan Malam Hari 🌌</h2>
            <p>"Lagi liat bintang ya? Jangan lupa istirahat, gunungnya nggak akan lari kok. Semangat terus kuliahnya ya, si pecinta alam! 🎒✨"</p>
            <hr style="border: 0.5px solid rgba(255,255,255,0.1)">
            <p style="font-size: 0.8rem; font-style: italic;">— From someone who cheers for you</p>
        </div>
    </div>

    <script>
        // Bikin bintang acak
        const starField = document.getElementById('starField');
        const starCount = 150;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const size = Math.random() * 3;
            const duration = (Math.random() * 3 + 2) + 's';

            star.style.left = x + '%';
            star.style.top = y + '%';
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.setProperty('--duration', duration);
            
            starField.appendChild(star);
        }

        function openMessage() {
            document.getElementById('message').style.display = 'block';
            document.getElementById('tentBtn').style.display = 'none';
            document.getElementById('instruction').style.display = 'none';
        }
    </script>
</body>
</html>
